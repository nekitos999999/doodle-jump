<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump - No Fall</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Пропускает клики сквозь счёт */
      box-sizing: border-box;
      padding: 20px;
    }
    #score {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }
    #restart-btn {
      position: absolute;
      bottom: 120px; /* Чуть выше низа, чтобы не перекрывать канвас на мобильных */
      left: 50%;
      transform: translateX(-50%);
      z-index: 10; /* Гарантированно поверх всего */
      
      padding: 18px 48px;
      font-size: 22px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(255, 71, 87, 0.4);
      pointer-events: auto; /* Кнопка реально нажимается */
      display: none; /* Скрыта, пока игра идёт */
      touch-action: manipulation; /* Чтобы на телефоне срабатывало с первого раза */
    }
    #restart-btn:active {
      transform: translateX(-50%) scale(0.96);
    }
  </style>
</head>
<body>

  <canvas id="game"></canvas>

  <!-- Слой интерфейса (счёт) -->
  <div id="ui-layer">
    <div id="score">Счёт: 0</div>
  </div>

  <!-- Кнопка перезапуска -->
  <button id="restart-btn" onclick="resetGame()">ИГРАТЬ СНОВА</button>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart-btn');

    // Физические размеры канваса (не CSS!)
    canvas.width = 400;
    canvas.height = 600;

    const GRAVITY = 0.6;
    const JUMP_STRENGTH = -12;
    const SPEED = 5;
    const PLATFORM_WIDTH = 60;
    const PLATFORM_HEIGHT = 15;
    const PLATFORM_GAP = 90; // Чуть меньше, чтобы платформы были чаще

    let player = {
      x: canvas.width / 2 - 20,
      y: canvas.height - 100, // Жёстко: ноги кота на высоте 500
      w: 40,
      h: 40,
      dy: 0,
      dx: 0
    };

    let platforms = [];
    let score = 0;
    let gameActive = true;
    let worldShift = 0; // Сдвиг мира вниз

    const img = new Image();
    img.src = 'hero.png';

    // Управление клавиатурой
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Управление тачем (для телефона)
    let touchX = 0;
    function startTouch(e) {
      e.preventDefault();
      touchX = e.touches[0].clientX;
    }
    function moveTouch(e) {
      e.preventDefault();
      const newX = e.touches[0].clientX;
      if (newX > touchX) player.dx = SPEED;
      else if (newX < touchX) player.dx = -SPEED;
      touchX = newX;
    }
    function endTouch() {
      player.dx = 0;
    }

    canvas.addEventListener('touchstart', startTouch, { passive: false });
    canvas.addEventListener('touchmove', moveTouch, { passive: false });
    canvas.addEventListener('touchend', endTouch, { passive: false });

    // Генерация платформ
    function initPlatforms() {
      platforms = [];
      let lastY = canvas.height - 100; // Начинаем ровно от ног кота

      for (let i = 0; i < 20; i++) {
        const x = Math.random() * (canvas.width - PLATFORM_WIDTH);
        // Каждая следующая платформа выше предыдущей
        const y = lastY - PLATFORM_GAP - Math.random() * 40;
        
        platforms.push({ x, y, w: PLATFORM_WIDTH, h: PLATFORM_HEIGHT });
        lastY = y;
      }
    }

    function update() {
      if (!gameActive) return;

      // Движение по X
      player.dx = 0;
      if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -SPEED;
      if (keys['ArrowRight'] || keys['KeyD']) player.dx = SPEED;
      player.x += player.dx;

      // Проход сквозь стены
      if (player.x > canvas.width) player.x = -player.w;
      if (player.x + player.w < 0) player.x = canvas.width;

      // Гравитация
      player.dy += GRAVITY;
      player.y += player.dy;

      // Коллизии с платформами
      let landed = false;
      for (const p of platforms) {
        if (
          player.x < p.x + p.w &&
          player.x + player.w > p.x &&
          player.y + player.h > p.y &&
          player.y + player.h < p.y + p.h + 10 &&
          player.dy > 0 // Падаем вниз
        ) {
          player.y = p.y - player.h;
          player.dy = 0;
          landed = true;
          
          // Прыжок
          player.dy = JUMP_STRENGTH;

          // Камера: если поднялись выше центра, сдвигаем мир вниз
          if (player.y < canvas.height / 2) {
            const diff = (canvas.height / 2) - player.y;
            player.y += diff;
            worldShift += diff;
            score += Math.floor(diff / 10);
            scoreEl.innerText = 'Счёт: ' + score;
          }
          break;
        }
      }

      // Проигрыш
      if (player.y > canvas.height) {
        gameActive = false;
        restartBtn.style.display = 'block';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Рисуем платформы со сдвигом
      for (const p of platforms) {
        const drawY = p.y - worldShift;
        if (drawY < canvas.height && drawY + p.h > 0) {
          ctx.fillStyle = '#4ECDC4';
          ctx.fillRect(p.x, drawY, p.w, p.h);
          ctx.strokeStyle = 'white';
          ctx.lineWidth = 1;
          ctx.strokeRect(p.x, drawY, p.w, p.h);
        }
      }

      // Рисуем кота
      if (img.complete && img.naturalHeight !== 0) {
        ctx.drawImage(img, player.x, player.y, player.w, player.h);
      } else {
        // Заглушка: оранжевый квадрат
        ctx.fillStyle = '#FFA500';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(player.x, player.y, player.w, player.h);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function resetGame() {
      player.y = canvas.height - 100;
      player.dy = 0;
      worldShift = 0;
      score = 0;
      gameActive = true;
      restartBtn.style.display = 'none';
      scoreEl.innerText = 'Счёт: 0';
      
      initPlatforms(); // Пересоздаём платформы ДО нового цикла
      loop();
    }

    // Гарантированный старт: сначала платформы, потом игра
    img.onload = () => {
      initPlatforms();
      loop();
    };
    img.onerror = () => {
      console.warn('hero.png не найден. Играем за оранжевый квадрат.');
      initPlatforms();
      loop();
    };
  </script>
</body>
</html>
