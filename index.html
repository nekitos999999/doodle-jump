<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump - Ironclad</title>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: absolute; top: 20px; left: 20px;
      color: white; font-size: 24px; font-weight: bold;
      text-shadow: 2px 2px 0 #000; pointer-events: none;
    }
    #restart {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: white; font-size: 40px; font-weight: bold;
      background: rgba(0,0,0,0.8); padding: 20px 40px;
      border: 2px solid white; cursor: pointer; display: none;
    }
  </style>
</head>
<body>

  <div id="ui">Счёт: <span id="score">0</span></div>
  <button id="restart" onclick="resetGame()">ИГРАТЬ СНОВА</button>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');

    // Настройка канваса (фиксированный размер для логики, растягивается CSS)
    canvas.width = 400;
    canvas.height = 600;

    // --- КОНФИГУРАЦИЯ ---
    const GRAVITY = 0.6;
    const JUMP_STRENGTH = -12;
    const SPEED = 5;
    const PLATFORM_WIDTH = 60;
    const PLATFORM_HEIGHT = 15;
    const PLATFORM_GAP = 100; // Расстояние между платформами по Y

    // --- СОСТОЯНИЕ ---
    let player = {
      x: canvas.width / 2 - 20,
      y: canvas.height - 100, // Кот ВСЕГДА стоит на этой высоте (пол)
      w: 40,
      h: 40,
      dy: 0,
      dx: 0
    };

    let platforms = [];
    let score = 0;
    let gameActive = true;
    let worldShift = 0; // Сдвиг мира (платформ) вниз

    const img = new Image();
    img.src = 'hero.png';

    // --- УПРАВЛЕНИЕ ---
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Тач для телефонов
    let touchX = 0;
    canvas.addEventListener('touchstart', e => {
      touchX = e.touches.clientX;
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      const newX = e.touches.clientX;
      if (newX > touchX) player.dx = SPEED;
      else if (newX < touchX) player.dx = -SPEED;
      touchX = newX;
    }, { passive: false });

    canvas.addEventListener('touchend', () => player.dx = 0);

    // --- ЛОГИКА ---

    function initPlatforms() {
      platforms = [];
      // Первая платформа: рисуем её ровно под ногами кота (y = 0 относительно пола)
      // Но в массиве мы храним её "мировую" координату.
      // Чтобы кот стоял на ней, платформа должна быть на y = canvas.height - 100 - PLATFORM_HEIGHT
      // НО! В этой версии мы двигаем мир. Кот стоит на y = canvas.height - 100.
      // Платформы имеют свои Y. Если платформа на Y=0, а кот на Y=500, они не столкнутся.
      
      // ПРАВИЛЬНАЯ ЛОГИКА ДЛЯ ЭТОГО КОДА:
      // Кот стоит на фиксированной высоте (canvas.height - 100).
      // Платформы генерируются ВЫШЕ этой линии.
      
      let lastY = canvas.height - 100; // Начинаем от уровня ног кота

      for (let i = 0; i < 15; i++) {
        const x = Math.random() * (canvas.width - PLATFORM_WIDTH);
        // Каждая следующая платформа выше предыдущей на PLATFORM_GAP
        const y = lastY - PLATFORM_GAP - Math.random() * 50; 
        
        platforms.push({ x, y, w: PLATFORM_WIDTH, h: PLATFORM_HEIGHT });
        lastY = y;
      }
    }

    function update() {
      if (!gameActive) return;

      // 1. Движение кота (X)
      player.dx = 0;
      if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -SPEED;
      if (keys['ArrowRight'] || keys['KeyD']) player.dx = SPEED;
      
      player.x += player.dx;

      // Проход сквозь стены
      if (player.x > canvas.width) player.x = -player.w;
      if (player.x + player.w < 0) player.x = canvas.width;

      // 2. Гравитация и падение кота
      player.dy += GRAVITY;
      player.y += player.dy;

      // 3. Коллизия с платформами
      // ВАЖНО: Мы проверяем столкновение между прямоугольником кота и прямоугольником платформы.
      // Координаты кота: (player.x, player.y)
      // Координаты платформы: (p.x, p.y)
      // worldShift не влияет на проверку коллизий, он влияет только на отрисовку!
      
      let landed = false;
      
      for (let p of platforms) {
        // Проверка пересечения прямоугольников
        if (
          player.x < p.x + p.w &&
          player.x + player.w > p.x &&
          player.y + player.h > p.y &&
          player.y + player.h < p.y + p.h + 10 && // Допуск сверху
          player.dy > 0 // Падаем ли мы вниз?
        ) {
          // Мы приземлились на платформу!
          player.y = p.y - player.h; // Ставим кота ровно на верх платформы
          player.dy = 0;
          landed = true;
          
          // Прыжок
          player.dy = JUMP_STRENGTH;
          
          // Если мы прыгнули выше, чем была самая нижняя платформа, сдвигаем мир вниз
          // Это создает иллюзию, что мы летим вверх
          if (player.y < canvas.height / 2) {
            const diff = (canvas.height / 2) - player.y;
            player.y += diff; // Поднимаем кота визуально
            worldShift += diff; // Сдвигаем все платформы вниз
            
            // Начисляем очки за пройденное расстояние
            score += Math.floor(diff / 10);
            scoreEl.innerText = score;
          }
          break; // Выходим, чтобы не задеть две платформы сразу
        }
      }

      // 4. Проверка проигрыша
      if (player.y > canvas.height) {
        gameActive = false;
        restartBtn.style.display = 'block';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Рисуем платформы
      for (let p of platforms) {
        // Рисуем платформу со сдвигом мира
        const drawY = p.y - worldShift;
        
        // Рисуем только если платформа видна на экране
        if (drawY < canvas.height && drawY + p.h > 0) {
          ctx.fillStyle = '#4ECDC4'; // Зеленый цвет
          ctx.fillRect(p.x, drawY, p.w, p.h);
          ctx.strokeStyle = 'white';
          ctx.strokeRect(p.x, drawY, p.w, p.h);
        }
      }

      // Рисуем кота
      // Кот рисуется всегда на его реальных координатах (player.y)
      // Но так как мы сдвигали player.y при скролле, нам нужно компенсировать это?
      // НЕТ. В нашей логике:
      // 1. Кот летит вверх (y уменьшается).
      // 2. Когда y становится маленьким, мы добавляем diff к player.y и к worldShift.
      // 3. Визуально кот остается на месте (примерно в центре), а мир уезжает вниз.
      // Значит, рисуем кота просто на player.y.
      
      if (img.complete && img.naturalHeight !== 0) {
        ctx.drawImage(img, player.x, player.y, player.w, player.h);
      } else {
        // Заглушка, если картинки нет
        ctx.fillStyle = '#FFA500';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.strokeStyle = 'white';
        ctx.strokeRect(player.x, player.y, player.w, h);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function resetGame() {
      player.y = canvas.height - 100;
      player.dy = 0;
      worldShift = 0;
      score = 0;
      scoreEl.innerText = 0;
      gameActive = true;
      restartBtn.style.display = 'none';
      initPlatforms();
      loop();
    }

    // Старт
    img.onload = () => {
      initPlatforms();
      loop();
    };
    
    // Если картинки нет, всё равно запускаем (будет оранжевый квадрат)
    img.onerror = () => {
      console.warn('hero.png не найден, используем заглушку');
      initPlatforms();
      loop();
    };

  </script>
</body>
</html>
