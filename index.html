<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Doodle Jump</title>

    <!-- PWA: чтобы iPhone мог добавить на экран «Домой» -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Doodle Jump">
    <meta name="theme-color" content="#87CEEB">

    <style>
      body { margin: 0; overflow: hidden; background: #87CEEB; font-family: Arial, sans-serif; touch-action: none; }
      canvas { display: block; width: 100vw; height: 100vh; }

      /* UI счётчика */
      #ui { 
        position: absolute; top: 20px; left: 20px; 
        color: white; font-size: 24px; font-weight: bold; 
        text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10; 
      }
      
      /* Кнопки управления на сенсорном экране */
      .controls {
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 30px; z-index: 20;
      }
      .btn {
        width: 80px; height: 80px; border-radius: 50%;
        background: rgba(255,255,255,0.4); backdrop-filter: blur(5px);
        border: 1px solid rgba(255,255,255,0.6);
        color: white; font-size: 32px; font-weight: bold;
        display: flex; align-items: center; justify-content: center;
        user-select: none; -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      .btn:active { background: rgba(255,255,255,0.8); }

      #game-over { 
        position: absolute; top: 50%; left: 50%; 
        transform: translate(-50%, -50%);
        color: white; text-align: center; 
        background: rgba(0, 0, 0, 0.85); padding: 40px; border-radius: 15px;
        display: none; z-index: 30;
      }

      button {
        margin-top: 15px; padding: 10px 30px; font-size: 18px; cursor: pointer;
        background: white; border: none; border-radius: 5px; color: #333;
      }
      button:hover { background: #ddd; }
    </style>
  </head>
  <body>

    <div id="ui">Счёт: <span id="score">0</span></div>
    <canvas id="game"></canvas>

    <div class="controls">
      <div class="btn" id="btn-left">←</div>
      <div class="btn" id="btn-right">→</div>
    </div>

    <div id="game-over">
      <h1>Игра окончена!</h1>
      <p>Твой счёт: <span id="final-score">0</span></p>
      <button onclick="location.reload()">Играть снова</button>
    </div>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      // Адаптация под размер экрана
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize(); // первый раз сразу

      // --- НАСТРОЙКИ ФИЗИКИ ---
      const GRAVITY = 0.65;
      const JUMP_FORCE = -12.5;
      const SPEED = 4;
      
      const HITBOX_MARGIN_X = 10;
      const HITBOX_TOP_FRACTION = 0.35;

      let score = 0;
      let gameActive = true;

      const player = { x: canvas.width / 2 - 20, y: 510, w: 40, h: 40, vx: 0, vy: 0 };
      const platforms = [];
      
      const playerImg = new Image();
      playerImg.src = 'hero.png'; // если файла нет — игра всё равно будет работать (красный квадрат)

      function createPlatform(x, y) {
        return { x, y, w: 70, h: 14, scored: false };
      }

      function getMaxJumpDistance() {
        const timeUp = Math.abs(JUMP_FORCE) / GRAVITY;
        const maxHorizontal = Math.abs(SPEED) * timeUp * 2;
        return maxHorizontal;
      }

      function reset() {
        score = 0;
        gameActive = true;
        
        player.x = canvas.width / 2 - 20;
        player.y = 510;
        player.vx = 0;
        player.vy = 0;

        platforms.length = 0;
        document.getElementById('score').innerText = score;
        document.getElementById('game-over').style.display = 'none';

        const startY = 550;
        platforms.push(createPlatform(canvas.width / 2 - 35, startY));

        const maxJumpDist = getMaxJumpDistance();
        const PLATFORM_GAP = 80;

        for (let i = 1; i < 10; i++) {
          const prev = platforms[i - 1];
          const y = prev.y - PLATFORM_GAP;

          const minX = prev.x - maxJumpDist;
          const maxX = prev.x + maxJumpDist;

          const safeMinX = Math.max(0, minX);
          const safeMaxX = Math.min(canvas.width - 70, maxX);

          const x = Math.random() * (safeMaxX - safeMinX) + safeMinX;
          platforms.push(createPlatform(x, y));
        }
      }

      function update() {
        if (!gameActive) return;

        player.vy += GRAVITY;
        player.x += player.vx;
        player.y += player.vy;

        // Проход сквозь стены по горизонтали
        if (player.x > canvas.width) player.x = -player.w;
        if (player.x < -player.w) player.x = canvas.width;

        let landed = false;

        for (const p of platforms) {
          const hitX = p.x + HITBOX_MARGIN_X;
          const hitW = p.w - HITBOX_MARGIN_X * 2;
          const hitY = p.y;
          const hitH = p.h * HITBOX_TOP_FRACTION;

          if (
            player.x < hitX + hitW &&
            player.x + player.w > hitX &&
            player.y + player.h > hitY &&
            player.y < hitY + hitH
          ) {
            if (player.vy > 0) {
              landed = true;
              player.vy = JUMP_FORCE;
              player.y = p.y - player.h;

              if (!p.scored) {
                score++;
                p.scored = true;
                document.getElementById('score').innerText = score;
              }
              break;
            }
          }
        }

        // Камера
        const cameraThreshold = canvas.height * 0.5; 
        if (player.y < cameraThreshold) {
          const diff = cameraThreshold - player.y;
          player.y = cameraThreshold;
          
          platforms.forEach(p => {
            p.y += diff;
          });

          const minY = canvas.height + 20;
          for (let i = platforms.length - 1; i >= 0; i--) {
            if (platforms[i].y > minY) {
              platforms.splice(i, 1);
              
              const last = platforms[platforms.length - 1];
              const maxJumpDist = getMaxJumpDistance();
              const PLATFORM_GAP = 80;
              const y = last.y - PLATFORM_GAP;

              const minX = last.x - maxJumpDist;
              const maxX = last.x + maxJumpDist;
              const safeMinX = Math.max(0, minX);
              const safeMaxX = Math.min(canvas.width - 70, maxX);

              const x = Math.random() * (safeMaxX - safeMinX) + safeMinX;
              platforms.push(createPlatform(x, y));
            }
          }
        }

        if (player.y > canvas.height) {
          gameActive = false;
          document.getElementById('final-score').innerText = score;
          document.getElementById('game-over').style.display = 'block';
        }
      }

      function draw() {
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#5F9EA0';
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;

        for (const p of platforms) {
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeRect(p.x, p.y, p.w, p.h);
        }

        if (playerImg.complete) {
          ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
        } else {
          ctx.fillStyle = 'red';
          ctx.fillRect(player.x, player.y, player.w, player.h);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      // Сенсорное управление
      const btnLeft = document.getElementById('btn-left');
      const btnRight = document.getElementById('btn-right');

      btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); player.vx = -SPEED; }, {passive: false});
      btnLeft.addEventListener('touchend', () => player.vx = 0);
      btnLeft.addEventListener('mousedown', () => player.vx = -SPEED);
      btnLeft.addEventListener('mouseup', () => player.vx = 0);

      btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); player.vx = SPEED; }, {passive: false});
      btnRight.addEventListener('touchend', () => player.vx = 0);
      btnRight.addEventListener('mousedown', () => player.vx = SPEED);
      btnRight.addEventListener('mouseup', () => player.vx = 0);

      reset();
      loop();
    </script>
  </body>
</html>
