<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump - WORKS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a1d;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      /* Красивый фон */
      background: radial-gradient(circle at 50% 0%, #2c3e50 0%, #1a1a1d 100%);
    }
    /* Слой для текста счёта */
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none; /* Чтобы клики проходили сквозь текст */
      z-index: 10;
    }
    #score {
      font-size: 28px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 16px;
      border-radius: 30px;
    }
    /* Экран проигрыша */
    #game-over-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    p { font-size: 24px; color: #ccc; margin-bottom: 40px; }
    button {
      padding: 15px 50px;
      font-size: 22px;
      background: linear-gradient(45deg, #ff6b6b, #feca57);
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <canvas id="game"></canvas>

  <!-- Счёт -->
  <div id="ui">
    <div id="score">Счёт: 0</div>
  </div>

  <!-- Экран проигрыша -->
  <div id="game-over-screen">
    <h1>GAME OVER</h1>
    <p>Твой результат: <span id="final-score">0</span></p>
    <button onclick="resetGame()">Играть снова</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('final-score');
    const gameOverScreen = document.getElementById('game-over-screen');

    // Физические размеры канваса (важно!)
    canvas.width = 400;
    canvas.height = 600;

    // --- НАСТРОЙКИ ---
    const GRAVITY = 0.6;
    const JUMP_STRENGTH = -12;
    const SPEED = 5;
    const PLATFORM_WIDTH = 70;
    const PLATFORM_HEIGHT = 12;
    
    // --- СОСТОЯНИЕ ---
    let player = {
      x: canvas.width / 2 - 20,
      y: 450, // Кот стоит на высоте 450 (примерно центр по Y)
      w: 40,
      h: 40,
      dy: 0,
      dx: 0
    };

    let platforms = [];
    let score = 0;
    let gameActive = true;

    const img = new Image();
    img.src = 'hero.png';

    // --- УПРАВЛЕНИЕ ---
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Тач управление (для телефона)
    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      const currentX = e.touches[0].clientX;
      if (currentX > touchStartX) player.dx = SPEED;
      else if (currentX < touchStartX) player.dx = -SPEED;
      touchStartX = currentX;
    }, { passive: false });

    canvas.addEventListener('touchend', () => player.dx = 0);

    // --- ГЕНЕРАЦИЯ ПЛАТФОРМ ---
    function spawnPlatforms() {
      platforms = [];
      // Первая платформа: рисуем её ровно ПОД ногами кота.
      // Кот на Y=450. Платформа должна быть на Y = 450 - высота_платформы.
      // Но чтобы он точно стоял на ней, сделаем хитрость: платформа будет на 460, а кот на 450.
      // Нет, лучше так: платформа на 470, кот на 450... Стоп.
      
      // ПРАВИЛЬНО: Кот стоит на Y=450. Значит, платформа должна быть на Y=490 (чтобы её верх был под ногами кота).
      // Y - это верхняя граница прямоугольника.
      // Если платформа на Y=490, её высота 12, значит она занимает 490..502.
      // Ноги кота на 450+40 = 490. Идеально.
      
      let lastY = 490; // Первая платформа ровно под ногами

      for (let i = 0; i < 25; i++) {
        const x = Math.random() * (canvas.width - PLATFORM_WIDTH);
        // Следующая платформа выше предыдущей (меньше Y)
        const y = lastY - 90 - Math.random() * 30; 
        platforms.push({ x, y, w: PLATFORM_WIDTH, h: PLATFORM_HEIGHT });
        lastY = y;
      }
    }

    // --- ОБНОВЛЕНИЕ ---
    function update() {
      if (!gameActive) return;

      // Движение влево/вправо
      player.dx = 0;
      if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -SPEED;
      if (keys['ArrowRight'] || keys['KeyD']) player.dx = SPEED;
      player.x += player.dx;

      // Проход сквозь стены
      if (player.x > canvas.width) player.x = -player.w;
      if (player.x + player.w < 0) player.x = canvas.width;

      // Гравитация
      player.dy += GRAVITY;
      player.y += player.dy;

      // Коллизии (СТОЛКНОВЕНИЯ)
      let isOnGround = false;
      for (const p of platforms) {
        // Проверяем пересечение прямоугольников
        if (
          player.x < p.x + p.w &&
          player.x + player.w > p.x &&
          player.y + player.h > p.y &&       // Ноги кота ниже верха платформы
          player.y + player.h < p.y + p.h + 10 && // Ноги кота не слишком глубоко в платформе
          player.dy > 0                        // Мы падаем вниз
        ) {
          // СТОИМ НА ПЛАТФОРМЕ
          player.y = p.y - player.h; // Ставим кота ровно на верх платформы
          player.dy = 0;             // Сбрасываем скорость падения
          isOnGround = true;         // Флаг: мы на земле
          
          // Прыжок!
          player.dy = JUMP_STRENGTH;
          
          // Если прыгнули высоко, начисляем очки
          if (player.y < 300) {
            score += 10;
            scoreEl.innerText = 'Счёт: ' + score;
          }
          break; // Выходим, чтобы не обработать две платформы сразу
        }
      }

      // Проверка проигрыша (упал вниз)
      if (player.y > canvas.height) {
        gameActive = false;
        finalScoreEl.innerText = score;
        gameOverScreen.style.display = 'flex';
      }
    }

    // --- ОТРИСОВКА ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Рисуем платформы
      platforms.forEach(p => {
        // Тень
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(p.x + 2, p.y + 2, p.w, p.h);
        
        // Сама платформа (приятный цвет)
        ctx.fillStyle = '#4ECDC4';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        
        // Обводка
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
      });

      // Рисуем кота
      if (img.complete && img.naturalHeight !== 0) {
        ctx.drawImage(img, player.x, player.y, player.w, player.h);
      } else {
        // Если картинки нет - рисуем аккуратного оранжевого кота
        ctx.fillStyle = '#FFA500';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(player.x, player.y, player.w, player.h);
        
        // Добавим немного "лица", чтобы не было совсем уныло
        ctx.fillStyle = '#fff';
        ctx.fillRect(player.x + 5, player.y + 10, 6, 6); // Глаз
        ctx.fillRect(player.x + 25, player.y + 10, 6, 6);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function resetGame() {
      player.y = 450;
      player.dy = 0;
      score = 0;
      gameActive = true;
      gameOverScreen.style.display = 'none';
      scoreEl.innerText = 'Счёт: 0';
      
      spawnPlatforms(); // Пересоздаём платформы
      loop();
    }

    // ЗАПУСК
    img.onload = () => {
      spawnPlatforms();
      loop();
    };
    
    img.onerror = () => {
      console.warn('hero.png не найден. Играем за оранжевого котика с глазами.');
      spawnPlatforms();
      loop();
    };
  </script>
</body>
</html>
