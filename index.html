<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- Критически важно для мобильных: фиксируем масштаб, запрещаем зум -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Doodle Jump</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #222;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none; /* Отключаем стандартное поведение браузера при касании */
    }
    canvas {
      display: block;
      /* Фиксированные размеры канваса (не проценты!) */
      width: 400px;
      height: 600px;
      background-color: #000;
      border: 1px solid #333;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
      image-rendering: pixelated; /* Чтобы не мылилось на ретине */
    }
  </style>
</head>
<body>

  <canvas id="game"></canvas>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('game');
      if (!canvas) {
        console.error('❌ Ошибка: не найден <canvas id="game">');
        return;
      }
      const ctx = canvas.getContext('2d');

      // Фиксируем внутренние размеры канваса
      canvas.width = 400;
      canvas.height = 600;

      let player = {
        x: canvas.width / 2 - 20,
        y: canvas.height - 100,
        w: 40,
        h: 40,
        dy: 0,
        dx: 0,
        speed: 5,
        jumpForce: -12,
        gravity: 0.6
      };

      let platforms = [];
      const platformWidth = 60;
      const platformHeight = 15;
      const platformGap = 100;

      let gameState = 'playing';
      let score = 0;
      let maxY = player.y;
      const particles = [];

      let restartBtn = {
        x: canvas.width / 2 - 75,
        y: canvas.height / 2 + 50,
        w: 150,
        h: 40,
        text: 'Играть снова'
      };

      function createPlatforms() {
        platforms = [];
        for (let i = 0; i < 7; i++) {
          const x = Math.random() * (canvas.width - platformWidth);
          const y = canvas.height - 150 - i * platformGap;
          const isSpring = Math.random() < 0.15;
          platforms.push({ x, y, w: platformWidth, h: platformHeight, isSpring });
        }
      }

      function createParticles(x, y) {
        for (let i = 0; i < 10; i++) {
          particles.push({
            x: x + player.w / 2,
            y: y + player.h / 2,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 1.0
          });
        }
      }

      // --- Управление: клавиатура + тачскрин ---
      const keys = {};
      window.addEventListener('keydown', e => keys[e.code] = true);
      window.addEventListener('keyup', e => keys[e.code] = false);

      let isLeftPressed = false;
      let isRightPressed = false;

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        
        if (touchX < canvas.width / 2) isLeftPressed = true;
        else isRightPressed = true;
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        isLeftPressed = false;
        isRightPressed = false;
      }, { passive: false });

      function updatePlayer() {
        // Движение влево/вправо
        if ((isLeftPressed || keys['ArrowLeft'] || keys['KeyA'])) {
          player.dx = -player.speed;
        } else if ((isRightPressed || keys['ArrowRight'] || keys['KeyD'])) {
          player.dx = player.speed;
        } else {
          player.dx = 0;
        }

        player.x += player.dx;

        // Проход сквозь стены
        if (player.x > canvas.width) player.x = -player.w;
        if (player.x + player.w < 0) player.x = canvas.width;

        // Гравитация
        player.dy += player.gravity;
        player.y += player.dy;

        let landed = false;
        for (const p of platforms) {
          if (
            player.x < p.x + p.w &&
            player.x + player.w > p.x &&
            player.y + player.h > p.y &&
            player.y + player.h < p.y + p.h + 10 &&
            player.dy > 0
          ) {
            player.y = p.y - player.h;
            player.dy = 0;
            landed = true;

            if (p.isSpring) {
              player.dy = -18;
              createParticles(player.x, player.y + player.h);
            } else {
              player.dy = player.jumpForce;
              createParticles(player.x, player.y + player.h);
            }
          }
        }

        // Прыжок в воздухе (по пробелу или тапу в центр — опционально, здесь только пробел)
        if (!landed && (keys['Space'] || keys['ArrowUp'] || keys['KeyW'])) {
          if (player.dy > 0) {
            player.dy = player.jumpForce;
            createParticles(player.x, player.y + player.h);
          }
        }

        // Счёт
        if (player.y < maxY) {
          const points = Math.floor((maxY - player.y) / 50);
          score += points;
          maxY = player.y;
        }

        // Проигрыш
        if (player.y > canvas.height) {
          gameState = 'gameover';
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'playing') {
          // Платформы
          for (const p of platforms) {
            ctx.fillStyle = p.isSpring ? '#9C27B0' : '#4CAF50';
            ctx.fillRect(p.x, p.y, p.w, p.h);
          }

          // Игрок: картинка ИЛИ красный квадрат
          if (playerImg && playerImg.complete && playerImg.naturalHeight !== 0) {
            ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
          } else {
            ctx.fillStyle = 'red';
            ctx.fillRect(player.x, player.y, player.w, player.h);
          }

          // Частицы
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.05;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = 'white';
            ctx.fillRect(p.x, p.y, 4, 4);
            if (p.life <= 0) particles.splice(i, 1);
          }
          ctx.globalAlpha = 1.0;

          // Счёт (жёстко в левом верхнем углу)
          ctx.fillStyle = 'white';
          ctx.font = '20px Arial';
          ctx.textAlign = 'left';
          ctx.fillText('Счёт: ' + score, 10, 30);

          // Прокрутка мира вверх
          if (player.y < canvas.height / 3) {
            const diff = canvas.height / 3 - player.y;
            player.y += diff;
            maxY += diff;
            platforms.forEach(p => {
              p.y += diff;
              if (p.y > canvas.height) {
                p.y = platforms[0].y - platformGap;
                p.x = Math.random() * (canvas.width - platformWidth);
                p.isSpring = Math.random() < 0.15;
              }
            });
          }
        } else if (gameState === 'gameover') {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = 'white';
          ctx.font = '30px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 20);
          ctx.fillText('Счёт: ' + score, canvas.width / 2, canvas.height / 2 + 20);

          ctx.fillStyle = '#4CAF50';
          ctx.fillRect(restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h);
          ctx.fillStyle = 'white';
          ctx.font = '18px Arial';
          ctx.fillText(restartBtn.text, restartBtn.x + 10, restartBtn.y + 25);
        }
      }

      // Загрузка картинки
      const playerImg = new Image();
      playerImg.src = 'hero.png';

      playerImg.onload = () => {
        createPlatforms();
        loop();
      };

      playerImg.onerror = () => {
        console.warn('⚠️ Картинка hero.png не найдена. Рисуем красный квадрат вместо героя.');
        createPlatforms();
        loop();
      };

      // Клик/тап по кнопке рестарта
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (gameState === 'gameover') {
          if (
            mouseX >= restartBtn.x &&
            mouseX <= restartBtn.x + restartBtn.w &&
            mouseY >= restartBtn.y &&
            mouseY <= restartBtn.y + restartBtn.h
          ) {
            // Полный сброс состояния
            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 100;
            player.dy = 0;
            player.dx = 0;
            maxY = player.y;
            score = 0;
            particles.length = 0;
            createPlatforms();
            gameState = 'playing';
          }
        }
      });

      function loop() {
        if (gameState === 'playing') {
          updatePlayer();
        }
        draw();
        requestAnimationFrame(loop);
      }
    });
  </script>
</body>
</html>
